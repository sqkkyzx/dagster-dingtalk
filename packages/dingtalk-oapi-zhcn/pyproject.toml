[project]
name = "dingtalk-oapi-zhcn"
version = "0.29.11.2"
description = "A Chinese-named DingTalk OpenAPI client"
readme = "README.md"
authors = [
    { name = "YiZixuan", email = "sqkkyzx@qq.com" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx",
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dingtalk_oapi_zhcn"]

[tool.hatch.build.targets.sdist]
include = [
    "/README.md",
    "/pyproject.toml",
    "/src/dingtalk_oapi_zhcn",
]
