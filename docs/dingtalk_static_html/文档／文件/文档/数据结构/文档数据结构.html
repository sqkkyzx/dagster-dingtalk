<!DOCTYPE html><html><head><meta charset="utf8" / /><meta name="searchtitle" content="" / /><meta name="keywords" content="" / /><meta name="author" content="" / /><title>文档数据结构</title><meta name="gmtModify" content="2026-03-31 09:56:49" / /></head><body data-tag="topic" id="topic-3257001" class="topic"><main id="main-3257001"><h1 data-tag="title" id="3cc906f3790ki" class="title">文档数据结构</h1><p id="dcdfd54ba1e4q" data-tag="shortdesc" class="shortdesc"></p><div data-tag="body" class="body"><p id="93a5944774dau">一篇在线文档是由若干个块元素组成的树，不同类型的 <code data-tag="inlineCode" id="029c6d34efxh8" class="inlineCode">BlockElment</code> 内部可嵌套的元素的类型是不同，例如 <code data-tag="inlineCode" id="2d864a7edetvb" class="inlineCode">高亮块</code> 里可以嵌套任意的 <code data-tag="inlineCode" id="89f9b460abs8w" class="inlineCode">BlockElement</code>，但是 <code data-tag="inlineCode" id="fd3096dce34kv" class="inlineCode">段落块</code> 下只能其嵌套 <code data-tag="inlineCode" id="3e2b074ba3u9j" class="inlineCode">InlineElement</code>。一篇文档的结构大致如下：</p><p id="882d87cd3bcb4"><img src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/3524684771/p1063438.png" alt="image" placement="break" id="fc6e4c7118c0k" class="image break" / /></p><p id="91248a4f32c0z">以这篇文档为例，拆解页面如下：</p><p id="6a0a57586a2kw"><img src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/3524684771/p1063439.png" alt="image" placement="break" id="8539c00250vx3" class="image break" / /></p></div></main></body></html>
