<!DOCTYPE html><html><head><meta charset="utf8" / /><meta name="searchtitle" content="" / /><meta name="keywords" content="" / /><meta name="author" content="" / /><title>单聊机器人概述</title><meta name="gmtModify" content="2025-10-09 17:54:59" / /></head><body id="topic-2097551" data-tag="topic" class="topic"><main id="90e5494087mk0"><h1 id="title-d9q-ugo-t11" data-tag="title" class="title">单聊机器人概述</h1><p id="shortdesc-jmn-69u-44m" data-tag="shortdesc" class="shortdesc">所谓单聊机器人，指让机器人能够在单聊场景下，像人一样给用户发送消息及和用户对话。</p><div id="conbody-kc6-g4k-ybh" data-tag="conbody" class="conbody"><section id="section-puz-9bu-ztf" class="section"><h2 id="title-861-iye-le9" data-tag="title" class="title">如何接入单聊机器人</h2><p id="p-42a-hxb-lbq">以下机器人类型支持在单聊场景使用：</p><ul id="ul-hd1-rj7-f3k"><li id="li-fdr-t6f-e07"><p id="9d8bf6d087ks0"><a data-tag="xref" id="04206b8497dze" href="/document/dingstart/configure-the-robot-application#" class="xref">企业内部开发机器人</a></p></li><li id="li-9h9-wie-yi2"><p id="a4bf87f087nd4"><a data-tag="xref" id="37783d2ec6vp8" href="/document/dingstart/third-party-enterprise-robots#" class="xref">第三方企业开发机器人</a></p></li></ul></section><p id="p-0g8-dy1-4ob">如图所示，内外小蜜为阿里巴巴为阿里员工开发的机器人，就是一个典型的单聊机器人，既能够推送消息给到用户，也能够通过对话能力和用户进行互动，也支持被客户搜索到。</p><p id="p-5pt-r92-9y2"><img id="img-7vi-ie8-8y3" placement="break" src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/8400576261/p296406.png" alt="内外小蜜" class="image break" / /></p><p id="p-j2l-px0-lmb">单聊机器人适用于以下场景：</p><ul id="ul-hi8-b6x-5a9"><li id="li-bcd-7l9-fv4"><p id="p-kro-jph-y7w"><a data-tag="xref" id="5592ca6282dtx" href="/document/development/task-notification#" class="xref">任务通知</a></p></li><li id="li-jxa-z54-iwv"><p id="p-q1b-24k-dpv"><a data-tag="xref" id="ba5e8b7fadb5u" href="/document/development/timing-push#" class="xref">定时推送</a></p></li><li id="li-2n5-tge-sa1"><p id="p-obi-ke2-etm"><a data-tag="xref" id="694b2d2df6cow" href="/document/development/monitoring-alarm#" class="xref">监控告警</a></p></li><li id="li-so3-rjh-5ih"><p id="p-d2e-rm8-hbb"><a data-tag="xref" id="d9727ea2e4god" href="/document/development/interactive-query-1#" class="xref">交互查询</a></p></li></ul></div></main></body></html>
