<!DOCTYPE html><html><head><meta charset="utf8" / /><meta name="searchtitle" content="" / /><meta name="keywords" content="" / /><meta name="author" content="" / /><title>交互查询</title><meta name="gmtModify" content="2025-10-09 17:55:12" / /></head><body id="topic-2097566" data-tag="topic" class="topic"><main id="f739e16087za1"><h1 id="title-2f8-7j2-51q" data-tag="title" class="title">交互查询</h1><p id="shortdesc-z0a-lpp-s00" data-tag="shortdesc" class="shortdesc">本文介绍钉钉机器人的交互查询最佳实践。</p><div id="conbody-616-59u-69h" data-tag="conbody" class="conbody"><section id="section-9fw-92a-dp2" class="section"><h2 id="title-998-ig8-n0n" data-tag="title" class="title">基础用法—通过卡片实现自动问答</h2><p id="p-tml-9ir-0iy">在很多业务场景下，需要通过问答的形式来解决用户所遇到的问题。在之前的业务场景下，用户需要通过多次提问来明确问题和解决方案，而在钉钉内，则可以通过用户提问来定位问题之后，利用钉钉卡片的刷新能力，来让用户通过点击交互的方式，实现信息的查询和确认。</p><p id="p-bl8-n2v-s0f"><img id="img-uti-xlk-bsn" placement="break" src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/2740927261/p296550.png" alt="卡片问答" class="image break" / /></p></section><section id="section-tv4-1u8-fkq" class="section"><h2 id="title-989-gh1-1fo" data-tag="title" class="title">高阶用法—通过AI能力实现对话式服务</h2><p id="p-1y6-8x4-v0s">通过接入阿里达摩院的机器人对话服务，开发者可以实现类似天猫精灵那样的单聊对话式问答服务，以解决用户所提出的某些模糊不清的问题。</p><p id="p-04r-ch0-ce3">如下图所示，通过对话式服务，以两到三轮对话，可以清晰直接的引导用户去到具体场景解决具体问题。</p><p id="p-rm4-dve-1eo"><img id="img-tju-h81-4ks" placement="break" src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/2740927261/p296733.png" alt="AI对话" class="image break" / /></p></section></div></main></body></html>
