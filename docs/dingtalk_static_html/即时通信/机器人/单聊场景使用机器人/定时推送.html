            <h1 data-tag="title" id="title-cmr-an2-u6r" class="title">定时推送</h1><p data-tag="shortdesc" id="shortdesc-bg4-ged-ggq" class="shortdesc">本文介绍了钉钉机器人定时推送消息和任务最佳实践。</p><div data-tag="conbody" id="conbody-jd4-mzo-huf" class="conbody"><section id="section-kkj-8ck-g0c" class="section"><h2 data-tag="title" id="title-0xm-j2h-s05" class="title">基础用法—定时推送和信息同步</h2><p data-tag="p" id="p-eug-bdv-gvx" class="p">如下图所示，对单聊机器人而言，可以每天或者在某个指定周期的情况下，为目标用户推送相关总结信息和报告，如进度通告，或者当日新闻等。</p><p data-tag="p" id="p-u6s-uzy-pi8" class="p"><img alt="定时任务" src="https://help-static-aliyun-doc.aliyuncs.com/assets/img/zh-CN/9970467261/p296446.png" placement="break" id="img-2gb-zv7-dbh" s="1" class="image break" / /></p></section><section id="section-b29-pv0-jbx" class="section"><h2 data-tag="title" id="title-n42-4ke-6iu" class="title">高阶用法—订阅式服务</h2><p id="p-d30-8me-e9w">可以利用推送互动卡片的方式，为用户提供轻量的订阅式服务，让用户可以订阅其感兴趣的信息或者通知，降低普遍推送带来的骚扰和压力。</p></section></div>
