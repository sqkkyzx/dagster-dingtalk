name: Publish Python package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build dingtalk-oapi-zhcn
        run: python -m build packages/dingtalk-oapi-zhcn

      - name: Publish dingtalk-oapi-zhcn
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: packages/dingtalk-oapi-zhcn/dist
          skip-existing: true

      - name: Build dagster-dingtalk
        run: python -m build

      - name: Publish dagster-dingtalk
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
